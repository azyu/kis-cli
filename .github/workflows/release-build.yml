name: Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (vMAJOR.MINOR.PATCH), e.g. v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: linux_amd64
            archive_ext: tar.gz
            binary_name: kis
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            asset_name: macos_arm64
            archive_ext: tar.gz
            binary_name: kis
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: windows_x64
            archive_ext: zip
            binary_name: kis.exe
          - name: windows-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            asset_name: windows_arm64
            archive_ext: zip
            binary_name: kis.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - name: Validate release tag format
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${TAG}"
            echo "Expected format: vMAJOR.MINOR.PATCH (example: v0.1.0)"
            exit 1
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --manifest-path rust/Cargo.toml -p kis-cli --bin kis --release --target "${{ matrix.target }}"

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          ARCHIVE_NAME="kis_${VERSION}_${{ matrix.asset_name }}"

          mkdir staging
          cp "rust/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" staging/kis
          cp README.md staging/
          cp LICENSE staging/
          tar -czf "${ARCHIVE_NAME}.tar.gz" -C staging kis README.md LICENSE

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ inputs.release_tag }}".TrimStart("v")
          $archiveName = "kis_${version}_${{ matrix.asset_name }}"

          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item "rust/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "staging/kis.exe"
          Copy-Item "README.md" "staging/README.md"
          Copy-Item "LICENSE" "staging/LICENSE"
          Compress-Archive -Path "staging/*" -DestinationPath "${archiveName}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kis_${{ matrix.asset_name }}
          path: kis_*_${{ matrix.asset_name }}.${{ matrix.archive_ext }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip | sort -k2 > checksums.txt

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.release_tag }}"

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG}" dist/* --title "${TAG}" --generate-notes --repo "${GITHUB_REPOSITORY}"
          fi
