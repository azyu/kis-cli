name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Fmt, Lint, Test, Build (ubuntu-latest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Format
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build
        run: cargo build --manifest-path rust/Cargo.toml -p kis-cli --bin kis --release
